name: Update Sitemap

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'generate_sitemap.py'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate sitemap.xml
        run: python generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml unchanged, nothing to commit."
          else
            git add sitemap.xml
            git commit -m "chore: auto-update sitemap.xml [skip ci]"
            git push
          fi
