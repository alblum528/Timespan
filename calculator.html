// ---- Calculation engine (identical to index.html) ----
function calcTotalHours(start, end) {
  return (end.getTime() - start.getTime()) / MS_PER_HOUR;
}
function calcWeekendHours(start, end, weekendDays) {
  let ms = 0;
  const cursor = new Date(start);
  cursor.setHours(0, 0, 0, 0);
  while (cursor < end) {
    const dayStart = new Date(cursor);
    const dayEnd = new Date(cursor);
    dayEnd.setDate(dayEnd.getDate() + 1);
    const dow = cursor.getDay();
    if (weekendDays.includes(dow)) {
      const overlapStart = Math.max(dayStart.getTime(), start.getTime());
      const overlapEnd = Math.min(dayEnd.getTime(), end.getTime());
      if (overlapEnd > overlapStart) ms += overlapEnd - overlapStart;
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return ms / MS_PER_HOUR;
}
function calcBusinessHours(start, end, bizStartHour, bizEndHour, weekendDays) {
  let ms = 0;
  const cursor = new Date(start);
  cursor.setHours(0, 0, 0, 0);
  while (cursor < end) {
    const dow = cursor.getDay();
    if (!weekendDays.includes(dow)) {
      const windowStart = new Date(cursor);
      windowStart.setHours(bizStartHour, 0, 0, 0);
      const windowEnd = new Date(cursor);
      windowEnd.setHours(bizEndHour, 0, 0, 0);
      const overlapStart = Math.max(windowStart.getTime(), start.getTime());
      const overlapEnd = Math.min(windowEnd.getTime(), end.getTime());
      if (overlapEnd > overlapStart) ms += overlapEnd - overlapStart;
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return ms / MS_PER_HOUR;
}

// ---- Time parsing ----
// Accepts: "9:30", "9", "930", "0930", "21:30", "2130", "9:30 AM", "9:30PM", etc.
function parseTimeStr(raw) {
  if (!raw || !raw.trim()) return null;
  let s = raw.trim().toUpperCase();
  let explicitAmPm = null;

  if (/P\.?M\.?\s*$/.test(s)) {
    explicitAmPm = 'PM';
    s = s.replace(/\s*P\.?M\.?\s*$/, '').trim();
  } else if (/A\.?M\.?\s*$/.test(s)) {
    explicitAmPm = 'AM';
    s = s.replace(/\s*A\.?M\.?\s*$/, '').trim();
  }

  s = s.replace(/[^0-9:]/g, '');
  if (!s) return null;

  let h, m = 0;
  if (s.includes(':')) {
    const parts = s.split(':');
    h = parseInt(parts[0], 10);
    m = parseInt(parts[1] || '0', 10);
  } else {
    const len = s.length;
    if (len <= 2)      { h = parseInt(s, 10); m = 0; }
    else if (len === 3){ h = parseInt(s[0], 10); m = parseInt(s.slice(1), 10); }
    else               { h = parseInt(s.slice(0, 2), 10); m = parseInt(s.slice(2), 10); }
  }

  if (isNaN(h) || isNaN(m) || m < 0 || m > 59) return null;

  let h24, suggestAmPm;

  if (explicitAmPm !== null) {
    if (h < 0 || h > 12) return null;
    suggestAmPm = explicitAmPm;
    h24 = explicitAmPm === 'AM' ? (h === 12 ? 0 : h) : (h === 12 ? 12 : h + 12);
  } else if (h >= 13 && h <= 23) {
    h24 = h;
    suggestAmPm = 'PM';
  } else if (h === 0) {
    h24 = 0;
    suggestAmPm = 'AM';
  } else {
    // Ambiguous (1–12), will use AM/PM toggle
    h24 = null;
    suggestAmPm = null;
  }

  // Display string in 12h (no leading zero on hour)
  let displayH = h24 !== null
    ? (h24 === 0 ? 12 : h24 > 12 ? h24 - 12 : h24)
    : h;
  const displayStr = `${displayH}:${String(m).padStart(2, '0')}`;

  return { h24, rawH: h, m, suggestAmPm, displayStr };
}

function resolveH24(parsed, ampmToggle) {
  if (parsed.h24 !== null) return parsed.h24;
  const h = parsed.rawH;
  return ampmToggle === 'AM' ? (h === 12 ? 0 : h) : (h === 12 ? 12 : h + 12);
}

function buildDate(dateStr, timeStr, ampmToggle) {
  if (!dateStr) return null;
  const parts = dateStr.split('-').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) return null;
  const [year, month, day] = parts;

  let h24 = 0, m = 0;
  if (timeStr && timeStr.trim()) {
    const parsed = parseTimeStr(timeStr);
    if (!parsed) return null;
    h24 = resolveH24(parsed, ampmToggle);
    m = parsed.m;
  }
  return new Date(year, month - 1, day, h24, m, 0, 0);
}

function formatDuration(totalHours) {
  const totalMin = Math.round(totalHours * 60);
  const days  = Math.floor(totalMin / (24 * 60));
  const hours = Math.floor((totalMin % (24 * 60)) / 60);
  const mins  = totalMin % 60;
  const parts = [];
  if (days  > 0) parts.push(`${days} day${days !== 1 ? 's' : ''}`);
  if (hours > 0) parts.push(`${hours} hr${hours !== 1 ? 's' : ''}`);
  if (mins  > 0 || parts.length === 0) parts.push(`${mins} min${mins !== 1 ? 's' : ''}`);
  return parts.join(', ');
}

function hourOptions() {
  const opts = [];
  for (let h = 0; h < 24; h++) {
    const label = h === 0 ? '12:00 AM' : h < 12 ? `${h}:00 AM` : h === 12 ? '12:00 PM' : `${h - 12}:00 PM`;
    opts.push({ value: h, label });
  }
  return opts;
}

function useMinViewportWidth(px) {
  const [matches, setMatches] = useState(() => window.innerWidth >= px);
  useEffect(() => {
    const mq = window.matchMedia(`(min-width: ${px}px)`);
    const onChange = () => setMatches(mq.matches);
    onChange();
    mq.addEventListener('change', onChange);
    return () => mq.removeEventListener('change', onChange);
  }, [px]);
  return matches;
}

// ---- Main component ----
function ManualCalculator() {
  const today = new Date().toISOString().slice(0, 10);

  const [startDate, setStartDate] = useState('');
  const [startTime, setStartTime] = useState('9:00');
  const [startAmPm, setStartAmPm] = useState('AM');

  const [endDate, setEndDate] = useState('');
  const [endTime, setEndTime] = useState('5:00');
  const [endAmPm, setEndAmPm] = useState('PM');

  const [bizStartHour, setBizStartHour] = useState(9);
  const [bizEndHour, setBizEndHour] = useState(17);
  const [weekendDays, setWeekendDays] = useState([0, 6]);

  const [results, setResults] = useState(null);
  const [startObj, setStartObj] = useState(null);
  const [endObj, setEndObj] = useState(null);
  const [error, setError] = useState('');

  const isDesktop = useMinViewportWidth(980);
  const isMobile = !useMinViewportWidth(640);

  function handleTimeBlur(which) {
    const raw = which === 'start' ? startTime : endTime;
    const parsed = parseTimeStr(raw);
    if (!parsed) return;
    // Normalize display to "H:MM"
    const setTime = which === 'start' ? setStartTime : setEndTime;
    const setAmPm = which === 'start' ? setStartAmPm : setEndAmPm;
    setTime(parsed.displayStr);
    if (parsed.suggestAmPm) setAmPm(parsed.suggestAmPm);
  }

  function handleCalculate() {
    setError('');
    setResults(null);

    if (!startDate || !endDate) {
      setError('Please enter both a start date and an end date.');
      return;
    }

    const s = buildDate(startDate, startTime, startAmPm);
    const e = buildDate(endDate, endTime, endAmPm);

    if (!s) { setError('Could not parse the start date or time. Try formats like 9:30, 2130, or 9:30 PM.'); return; }
    if (!e) { setError('Could not parse the end date or time. Try formats like 9:30, 2130, or 9:30 PM.'); return; }
    if (e <= s) { setError('End date/time must be after start date/time.'); return; }
    if (bizEndHour <= bizStartHour) { setError('Business hours end time must be after start time.'); return; }

    const total   = calcTotalHours(s, e);
    const weekend = calcWeekendHours(s, e, weekendDays);
    const weekday = total - weekend;
    const business = calcBusinessHours(s, e, bizStartHour, bizEndHour, weekendDays);

    setStartObj(s);
    setEndObj(e);
    setResults({ total, weekend, weekday, business });
  }

  function handleReset() {
    setResults(null);
    setError('');
    setStartDate('');
    setStartTime('9:00');
    setStartAmPm('AM');
    setEndDate('');
    setEndTime('5:00');
    setEndAmPm('PM');
  }

  const labelStyle = { fontSize: 12, fontWeight: 600, color: '#444', letterSpacing: '0.02em' };

  return React.createElement('div', {
    style: { minHeight: '100vh', background: COLORS.paper, fontFamily: FONT_BODY, color: COLORS.ink }
  },

    // ---- Nav ----
    React.createElement('div', {
      style: { background: COLORS.ink, padding: isMobile ? '14px 16px' : '16px 28px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }
    },
      React.createElement('a', { href: 'index.html', style: { display: 'flex', alignItems: 'center', gap: 12, textDecoration: 'none' } },
        React.createElement(BrandIcon, null),
        React.createElement('div', null,
          React.createElement('div', { style: { fontFamily: FONT_DISPLAY, fontWeight: 600, fontSize: 17, color: COLORS.paper, letterSpacing: '-0.01em' } }, 'Calculate My Hours'),
          React.createElement('div', { style: { fontSize: 11, color: '#9AA3AF', fontFamily: FONT_BODY, marginTop: 2 } }, 'Free timespan utility')
        )
      ),
      !isMobile && React.createElement('nav', { style: { display: 'flex', alignItems: 'center', gap: 20 } },
        React.createElement('a', { href: 'index.html', style: { fontSize: 13, color: '#9AA3AF', textDecoration: 'none', fontWeight: 500 } }, 'Bulk Spreadsheet Calculator'),
        React.createElement('a', { href: 'about.html', style: { fontSize: 13, color: '#9AA3AF', textDecoration: 'none', fontWeight: 500 } }, 'About'),
        React.createElement('a', { href: 'contact.html', style: { fontSize: 13, color: '#9AA3AF', textDecoration: 'none', fontWeight: 500 } }, 'Contact')
      )
    ),

    // ---- Leaderboard ad ----
    !isMobile && React.createElement('div', {

<script>
(function() {
  var btn = document.getElementById('cmh-ham');
  var nav = document.getElementById('cmh-mob-nav');
  btn.addEventListener('click', function() {
    var open = nav.classList.toggle('open');
    btn.setAttribute('aria-expanded', open);
  });
  nav.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      nav.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#cmh-ham') && !e.target.closest('#cmh-mob-nav')) {
      nav.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }
  });
  new MutationObserver(function(_, mo) {
    var r = document.getElementById('root');
    var header = r && r.firstChild && r.firstChild.firstChild;
    if (!header) return;
    mo.disconnect();
    new ResizeObserver(function(entries) {
      nav.style.top = entries[0].contentRect.height + 'px';
    }).observe(header);
  }).observe(document.getElementById('root'), { childList: true });
})();
</script>
